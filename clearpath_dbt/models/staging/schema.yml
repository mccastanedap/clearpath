version: 2
sources:
  - name: main
    description: "Raw data from Clearpath pipeline"
    tables:
      - name: sales
        description: "Raw sales transactions"
        columns:
          - name: date
            tests:
              - not_null
          - name: quantity
            tests:
              - not_null
          - name: price
            tests:
              - not_null
              
models:
  - name: stg_sales
    description: "Cleaned and standardized sales data"
    columns:
      - name: date
        description: "Date of sale"
        tests:
          - not_null
      - name: product_name
        description: "Name of product sold"
        tests:
          - not_null
      - name: quantity
        description: "Units sold"
        tests:
          - not_null
      - name: price
        description: "Price per unit"
        tests:
          - not_null