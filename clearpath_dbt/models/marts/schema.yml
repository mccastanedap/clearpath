version: 2

models:
  - name: mart_daily_revenue
    description: "Calculated daily revenue for each product"
    columns:
      - name: date
        description: "Date of sale"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for the day"
        tests:
          - not_null

  - name: mart_top_products
    description: "Top selling products by revenue"
    columns:
      - name: product_name
        description: "Name of product"
        tests:
          - not_null
      - name: total_sold
        description: "Total quantity sold"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by the product"
        tests:
          - not_null

  - name: mart_product_velocity
    description: "Product velocity metrics"
    columns:
      - name: product_name
        description: "Name of product"
        tests:
          - not_null
      - name: total_sold
        description: "Total quantity sold"
        tests:
          - not_null
      - name: days_in_market
        description: "Number of days the product has been in the market"
        tests:
          - not_null
      - name: velocity
        description: "Average quantity sold per day"
        tests:
          - not_null   

