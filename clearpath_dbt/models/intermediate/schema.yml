models:
  - name: int_sales_revenue
    description: "Intermediate model calculating total revenue per day"
    columns:
      - name: date
        description: "Date of sale"
        tests:
          - not_null
      - name: product_name
        description: "Name of product sold"
        tests:
          - not_null
      - name: quantity
        description: "Units sold"
        tests:
          - not_null
      - name: price
        description: "Price per unit"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for the sale (quantity * price)"
        tests:
          - not_null
      - name: is_known_product
        description: "Flag indicating if the product is known (exists in product catalog)"
        tests:
          - not_null